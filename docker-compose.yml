name: retail-forecast

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
  AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MLFLOW_EXPERIMENT_NAME: retail_forecast
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  MLFLOW_S3_ENDPOINT_URL: http://minio:9000

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  image: retail-airflow-custom:latest
  environment:
    <<: *airflow-env
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./:/opt/project
  depends_on:
    airflow-postgres:
      condition: service_healthy
    mlflow:
      condition: service_started

services:
  analytics-db:
    image: pgvector/pgvector:pg15
    container_name: retail-analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5433:5432"
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 3s
      retries: 30

  analytics-load:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: retail-forecast-loader:latest
    container_name: retail-analytics-load
    restart: "no"
    depends_on:
      analytics-db:
        condition: service_healthy
    environment:
      ANALYTICS_DATABASE_URL: postgresql+psycopg2://analytics:analytics@analytics-db:5432/analytics
    volumes:
      - ./data:/app/data
      - ./model_store:/app/model_store
      - ./:/app
    command: python scripts/load_analytics_db.py

  minio:
    image: minio/minio:latest
    container_name: retail-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER_REDIRECT_URL: "https://minio.sales-forecasts.com"
      MINIO_SERVER_URL: "https://minio-api.sales-forecasts.com"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio-init:
    image: minio/mc:latest
    container_name: retail-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb -p local/mlflow || true &&
      mc anonymous set none local/mlflow || true
      "

  mlflow-postgres:
    image: postgres:15
    container_name: retail-mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - mlflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 5s
      timeout: 3s
      retries: 30

  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
    image: retail-mlflow-custom:2.14.3
    container_name: retail-mlflow
    restart: unless-stopped
    depends_on:
      mlflow-postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql+psycopg2://mlflow:mlflow@mlflow-postgres:5432/mlflow
      - --default-artifact-root
      - s3://mlflow/

  airflow-postgres:
    image: postgres:15
    container_name: retail-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 3s
      retries: 30

  airflow-init:
    <<: *airflow-common
    container_name: retail-airflow-init
    restart: "no"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname Admin
        --role Admin
        --email admin@example.com || true
      "

  airflow-webserver:
    <<: *airflow-common
    container_name: retail-airflow-webserver
    restart: unless-stopped
    environment:
      <<: *airflow-env
      AIRFLOW__WEBSERVER__BASE_URL: "http://retail.sales-forecasts.com/airflow"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: bash -c "airflow webserver"
    networks:
      default:
        aliases:
          - airflow-webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: retail-airflow-scheduler
    restart: unless-stopped
    environment:
      <<: *airflow-env
      AIRFLOW__WEBSERVER__BASE_URL: "http://retail.sales-forecasts.com/airflow"
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: bash -c "airflow scheduler"

  streamlit:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: retail-forecast-streamlit:latest
    container_name: retail-streamlit
    restart: unless-stopped
    depends_on:
      analytics-db:
        condition: service_healthy
      analytics-load:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    environment:
      STREAMLIT_SERVER_BASE_URL_PATH: "streamlit"
      ANALYTICS_DATABASE_URL: "${ANALYTICS_DATABASE_URL:-postgresql+psycopg2://analytics:analytics@analytics-db:5432/analytics}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MLFLOW_S3_ENDPOINT_URL: "http://minio:9000"
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
      - ./model_store:/app/model_store

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: retail-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: retail-cadvisor
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  postgres-exporter-analytics:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: retail-postgres-exporter-analytics
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://analytics:analytics@analytics-db:5432/analytics?sslmode=disable"
    depends_on:
      analytics-db:
        condition: service_healthy

  postgres-exporter-airflow:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: retail-postgres-exporter-airflow
    restart: unless-stopped
    ports:
      - "9188:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://airflow:airflow@airflow-postgres:5432/airflow?sslmode=disable"
    depends_on:
      airflow-postgres:
        condition: service_healthy

  postgres-exporter-mlflow:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: retail-postgres-exporter-mlflow
    restart: unless-stopped
    ports:
      - "9189:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://mlflow:mlflow@mlflow-postgres:5432/mlflow?sslmode=disable"
    depends_on:
      mlflow-postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: retail-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.route-prefix=/prometheus"
      - "--web.external-url=http://retail.sales-forecasts.com/prometheus"
    depends_on:
      - node-exporter
      - cadvisor
      - postgres-exporter-analytics
      - postgres-exporter-airflow
      - postgres-exporter-mlflow

  grafana:
    image: grafana/grafana:11.1.0
    container_name: retail-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      GF_SERVER_ROOT_URL: "http://retail.sales-forecasts.com/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  nginx:
    image: nginx:latest
    container_name: retail-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/auth/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - airflow-webserver
      - mlflow
      - grafana
      - prometheus
      - streamlit

volumes:
  analytics_pg_data:
  minio_data:
  mlflow_pg_data:
  airflow_pg_data:
  prometheus_data:
  grafana_data:
