global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres-analytics
    static_configs:
      - targets: ["postgres-exporter-analytics:9187"]

  - job_name: postgres-airflow
    static_configs:
      - targets: ["postgres-exporter-airflow:9187"]

  - job_name: postgres-mlflow
    static_configs:
      - targets: ["postgres-exporter-mlflow:9187"]
